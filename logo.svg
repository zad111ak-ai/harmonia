<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="g2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="60" fill="url(#bg)"/>
  <!-- Infinity-ish loop — три переплетённых цикла -->
  <!-- Левый цикл -->
  <path d="M110 280 Q80 200 110 140 Q130 100 180 90 Q240 80 270 120" stroke="url(#g1)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Правый цикл -->
  <path d="M270 120 Q300 160 290 220 Q280 270 230 300 Q180 320 130 300" stroke="url(#g2)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Центральный цикл (вверх) -->
  <path d="M130 300 Q160 260 200 250 Q240 240 270 260 Q290 280 280 200" stroke="url(#g3)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Маленькие стрелки-индикаторы -->
  <circle cx="130" cy="90" r="6" fill="#38bdf8" opacity="0.7"/>
  <circle cx="260" cy="300" r="6" fill="#c084fc" opacity="0.7"/>
  <circle cx="200" cy="200" r="8" fill="#38bdf8" opacity="0.9"/>
</svg>
